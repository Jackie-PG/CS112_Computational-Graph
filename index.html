<!DOCTYPE html>
<!-- 
1. h1 - h6 - heading: tạo ra tiêu đề các cấp
2. p - paragraph: tạo đoạn văn
3. img - image: chèn hình ảnh
4. a - anchor: tạo liên kết tới trang web khác
5. ul, li - unordered list, list item: tạo danh sách các item
6. table: tạo bảng
7. input: tạo ô để nhập vào (có nhiều loại input khác nhau)
8. button: tạo 1 nút
9. div: tạo khối để bao quanh toàn bộ nội dung bên trong
 -->
<html>
    <!-- Phần đầu -->
    <head>
        <title>F8 - Shop</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="style.css">

    </head>

</html>
